<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Hacienda San Andrés · Panel de contenido</title>
  <link rel="icon" href="data:," />
  <!-- Netlify Identity (login, invitaciones y recuperación de contraseña) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- Decap CMS (sucesor de Netlify CMS) -->
  <script src="https://unpkg.com/decap-cms@^3.8.4/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function (user) {
        if (!user) {
          window.netlifyIdentity.on("login", function () {
            document.location.href = "/admin/";
          });
        }
      });
      window.netlifyIdentity.init();
    }
  </script>
</body>
</html>
